name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: go tool golangci-lint run ./...

      - name: Test
        run: go test -v -race ./...

      - name: License check
        run: make license-check

      - name: Build (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o bin/nic-watchdog .
